<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f0eb;
      color: #3a3a3a;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.4rem;
      color: #2c2c2c;
    }

    .count {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }

    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th {
      background: #4a7c6f;
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.75rem;
      position: sticky;
      top: 0;
    }

    th, td {
      padding: 10px 14px;
      text-align: left;
      white-space: nowrap;
    }

    tr:nth-child(even) { background: #faf8f5; }
    tr:hover { background: #f0ece7; }

    td.browser {
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td a {
      color: #4a7c6f;
      text-decoration: none;
      font-weight: 600;
    }

    td a:hover { text-decoration: underline; }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .pagination {
      display: none;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 20px 24px;
      margin-top: 20px;
      padding: 16px 20px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
      font-size: 0.85rem;
    }

    .pagination.visible { display: flex; }

    .pagination .page-size-group,
    .pagination .nav-group {
      display: inline-flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
    }

    .pagination label {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin: 0;
    }

    .pagination .nav-buttons {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .pagination .pagination-sub {
      color: #666;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .pagination button {
      font-family: inherit;
      font-size: 1rem;
      line-height: 1;
      min-width: 2.5rem;
      padding: 8px 12px;
      border: 1px solid #4a7c6f;
      border-radius: 8px;
      background: #4a7c6f;
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }

    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .pagination button:not(:disabled):hover {
      background: #3d6a5f;
    }

    .pagination select {
      font-family: inherit;
      font-size: 0.85rem;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #e5ddd5;
      background: #faf8f5;
    }

  </style>
</head>
<body>
  <h1>Visitor Log</h1>
  <div class="count" id="count"></div>
  <div class="table-wrap">
    <div class="loading" id="loading">Loading...</div>
    <table id="table" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Date &amp; Time</th>
          <th>IP Address</th>
          <th>City</th>
          <th>Region</th>
          <th>Country</th>
          <th>Location</th>
          <th>Browser</th>
          <th>Referrer</th>
          <th>Org</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pagination" id="pagination" aria-label="Pagination">
    <div class="page-size-group">
      <label>
        Rows per page
        <select id="pageSize">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </label>
      <span class="pagination-sub" id="showingRange"></span>
    </div>
    <div class="nav-group">
      <span class="pagination-sub" id="pageRange"></span>
      <div class="nav-buttons">
        <button type="button" id="btnFirst" aria-label="First page">&#171;</button>
        <button type="button" id="btnPrev" aria-label="Previous page">&#8249;</button>
        <button type="button" id="btnNext" aria-label="Next page">&#8250;</button>
        <button type="button" id="btnLast" aria-label="Last page">&#187;</button>
      </div>
    </div>
  </div>

  <script>
    const PROJECT = 'finances-388507';
    const COLLECTION = 'biodata-visits';

    function parseBrowser(ua) {
      const mobile = /Mobile|Android/i.test(ua) ? ' Mobile' : '';
      let name, ver;

      if ((ver = ua.match(/Edg\/(\d+)/))) name = 'Edge';
      else if ((ver = ua.match(/OPR\/(\d+)/))) name = 'Opera';
      else if ((ver = ua.match(/Chrome\/(\d+)/))) name = 'Chrome';
      else if ((ver = ua.match(/Firefox\/(\d+)/))) name = 'Firefox';
      else if ((ver = ua.match(/Version\/(\d+).*Safari/))) name = 'Safari';
      else return ua.substring(0, 50);

      return `${name}${mobile}/${ver[1]}`;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: true
      });
    }

    function getField(doc, name) {
      const f = doc.fields?.[name];
      return f?.stringValue || f?.doubleValue?.toString() || '–';
    }

    function mapsLink(doc) {
      const lat = doc.fields?.latitude?.doubleValue;
      const lng = doc.fields?.longitude?.doubleValue;
      if (lat && lng) {
        return `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">📍 View</a>`;
      }
      return '–';
    }

    let allDocs = [];
    let currentPage = 1;
    let pageSize = 25;

    function totalPages() {
      return Math.max(1, Math.ceil(allDocs.length / pageSize));
    }

    function renderTablePage() {
      const tbody = document.getElementById('tbody');
      const total = allDocs.length;
      const pages = totalPages();
      if (currentPage > pages) currentPage = pages;

      const start = (currentPage - 1) * pageSize;
      const slice = allDocs.slice(start, start + pageSize);

      tbody.innerHTML = '';
      slice.forEach((doc, i) => {
        const rowNum = start + i + 1;
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${rowNum}</td>
            <td>${formatDate(getField(doc, 'timestamp'))}</td>
            <td>${getField(doc, 'ip')}</td>
            <td>${getField(doc, 'city')}</td>
            <td>${getField(doc, 'region')}</td>
            <td>${getField(doc, 'country')}</td>
            <td>${mapsLink(doc)}</td>
            <td class="browser" title="${getField(doc, 'browser')}">${parseBrowser(getField(doc, 'browser'))}</td>
            <td>${getField(doc, 'referrer')}</td>
            <td>${getField(doc, 'org')}</td>`;
        tbody.appendChild(tr);
      });

      const end = Math.min(start + slice.length, total);
      const showingEl = document.getElementById('showingRange');
      const pageEl = document.getElementById('pageRange');
      if (total === 0) {
        showingEl.textContent = 'No rows';
        pageEl.textContent = '';
      } else {
        showingEl.textContent = `Showing ${start + 1}–${end} of ${total}`;
        pageEl.textContent = `Page ${currentPage} of ${pages}`;
      }

      const atFirst = currentPage <= 1;
      const atLast = currentPage >= pages;
      document.getElementById('btnFirst').disabled = atFirst;
      document.getElementById('btnPrev').disabled = atFirst;
      document.getElementById('btnNext').disabled = atLast;
      document.getElementById('btnLast').disabled = atLast;
    }

    document.getElementById('pageSize').addEventListener('change', (e) => {
      pageSize = Number(e.target.value);
      currentPage = 1;
      renderTablePage();
    });

    document.getElementById('btnFirst').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage = 1;
        renderTablePage();
      }
    });

    document.getElementById('btnPrev').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderTablePage();
      }
    });

    document.getElementById('btnNext').addEventListener('click', () => {
      if (currentPage < totalPages()) {
        currentPage++;
        renderTablePage();
      }
    });

    document.getElementById('btnLast').addEventListener('click', () => {
      const pages = totalPages();
      if (currentPage < pages) {
        currentPage = pages;
        renderTablePage();
      }
    });

    fetch(`https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents/${COLLECTION}?pageSize=1000`)
      .then(res => res.json())
      .then(data => {
        allDocs = data.documents || [];

        allDocs.sort((a, b) => {
          const ta = getField(a, 'timestamp');
          const tb = getField(b, 'timestamp');
          return tb.localeCompare(ta);
        });

        document.getElementById('count').textContent = `${allDocs.length} visit${allDocs.length !== 1 ? 's' : ''}`;
        document.getElementById('loading').style.display = 'none';

        document.getElementById('table').style.display = 'table';
        document.getElementById('pagination').classList.add('visible');

        pageSize = Number(document.getElementById('pageSize').value);
        currentPage = 1;
        renderTablePage();
      })
      .catch(err => {
        document.getElementById('loading').textContent = 'Failed to load visitor data.';
        console.error(err);
      });
  </script>
</body>
</html>
