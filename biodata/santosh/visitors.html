<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visitor Log</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f5f0eb;
      color: #3a3a3a;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
      font-size: 1.4rem;
      color: #2c2c2c;
    }

    .count {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 20px;
    }

    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    th {
      background: #4a7c6f;
      color: #fff;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.75rem;
      position: sticky;
      top: 0;
    }

    th, td {
      padding: 10px 14px;
      text-align: left;
      white-space: nowrap;
    }

    tr:nth-child(even) { background: #faf8f5; }
    tr:hover { background: #f0ece7; }

    td.browser {
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td a {
      color: #4a7c6f;
      text-decoration: none;
      font-weight: 600;
    }

    td a:hover { text-decoration: underline; }

    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>Visitor Log</h1>
  <div class="count" id="count"></div>
  <div class="table-wrap">
    <div class="loading" id="loading">Loading...</div>
    <table id="table" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Date &amp; Time</th>
          <th>IP Address</th>
          <th>City</th>
          <th>Region</th>
          <th>Country</th>
          <th>Location</th>
          <th>Browser</th>
          <th>Referrer</th>
          <th>Org</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script>
    const PROJECT = 'finances-388507';
    const COLLECTION = 'biodata-visits';

    function parseBrowser(ua) {
      const mobile = /Mobile|Android/i.test(ua) ? ' Mobile' : '';
      let name, ver;

      if ((ver = ua.match(/Edg\/(\d+)/))) name = 'Edge';
      else if ((ver = ua.match(/OPR\/(\d+)/))) name = 'Opera';
      else if ((ver = ua.match(/Chrome\/(\d+)/))) name = 'Chrome';
      else if ((ver = ua.match(/Firefox\/(\d+)/))) name = 'Firefox';
      else if ((ver = ua.match(/Version\/(\d+).*Safari/))) name = 'Safari';
      else return ua.substring(0, 50);

      return `${name}${mobile} ${ver[1]}`;
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString('en-IN', {
        day: '2-digit', month: 'short', year: 'numeric',
        hour: '2-digit', minute: '2-digit', hour12: true
      });
    }

    function getField(doc, name) {
      const f = doc.fields?.[name];
      return f?.stringValue || f?.doubleValue?.toString() || '–';
    }

    function mapsLink(doc) {
      const lat = doc.fields?.latitude?.doubleValue;
      const lng = doc.fields?.longitude?.doubleValue;
      if (lat && lng) {
        return `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">📍 View</a>`;
      }
      return '–';
    }

    fetch(`https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents/${COLLECTION}?pageSize=1000`)
      .then(res => res.json())
      .then(data => {
        const docs = data.documents || [];

        docs.sort((a, b) => {
          const ta = getField(a, 'timestamp');
          const tb = getField(b, 'timestamp');
          return tb.localeCompare(ta);
        });

        document.getElementById('count').textContent = `${docs.length} visit${docs.length !== 1 ? 's' : ''}`;
        document.getElementById('loading').style.display = 'none';

        const table = document.getElementById('table');
        const tbody = document.getElementById('tbody');
        table.style.display = 'table';

        docs.forEach((doc, i) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${i + 1}</td>
            <td>${formatDate(getField(doc, 'timestamp'))}</td>
            <td>${getField(doc, 'ip')}</td>
            <td>${getField(doc, 'city')}</td>
            <td>${getField(doc, 'region')}</td>
            <td>${getField(doc, 'country')}</td>
            <td>${mapsLink(doc)}</td>
            <td class="browser" title="${getField(doc, 'browser')}">${parseBrowser(getField(doc, 'browser'))}</td>
            <td>${getField(doc, 'referrer')}</td>
            <td>${getField(doc, 'org')}</td>`;
          tbody.appendChild(tr);
        });
      })
      .catch(err => {
        document.getElementById('loading').textContent = 'Failed to load visitor data.';
        console.error(err);
      });
  </script>
</body>
</html>
